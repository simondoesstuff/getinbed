# Ensure cmake is available for flate2/zlib-ng in cross-compilation Docker images.
[build.env]
passthrough = ["CARGO_TERM_COLOR"]

[target.aarch64-unknown-linux-gnu]
pre-build = ["apt-get update -qq && apt-get install -y cmake"]

[target.x86_64-unknown-linux-musl]
pre-build = ["apt-get update -qq && apt-get install -y cmake"]
